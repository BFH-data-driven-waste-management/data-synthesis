service_schedule:
  metadata:
    summer_override_policy: "override_if_denser"
    ordering_policy:
      - "daily_first"
      - "more_frequent_first"
      - "within_same_frequency_keep_defined_order"

  seasons:
    summer:
      start_month: 5
      start_day: 1
      end_month: 9
      end_day: 30

  vehicles:
    - vehicle_number: 1
      rules:
        - area: "RobertWalser"
          frequency:
            type: "daily"

        - area: "Innenstadt West"
          frequency:
            type: "weekly_days"
            interval_days: [1, 3, 5, 7]

        - area: "Altstadt"
          frequency:
            type: "weekly_days"
            interval_days: [2, 4, 6]

        - area: "Seequartiere"
          frequency:
            type: "weekly_days"
            weekdays: [1, 3]
          seasonal_overrides:
            - season: "summer"
              frequency:
                type: "weekly_days"
                interval_days: [2, 4, 6]

        - area: "Moesli"
          frequency:
            type: "weekly_days"
            weekdays: [1]

        - area: "Madretsch"
          frequency:
            type: "weekly_days"
            weekdays: [2]

        - area: "Linde"
          frequency:
            type: "weekly_days"
            weekdays: [3]

        - area: "Muehlefeld"
          frequency:
            type: "weekly_days"
            weekdays: [4]

        - area: "Vingelz"
          frequency:
            type: "weekly_days"
            weekdays: [5]

        - area: "Beaumont"
          frequency:
            type: "weekly_days"
            weekdays: [1]

        - area: "Gurzelen"
          frequency:
            type: "weekly_days"
            weekdays: [2]

    - vehicle_number: 2
      rules:
        - area: "Innenstadt"
          frequency:
            type: "daily"

        - area: "Innenstadt Ost"
          frequency:
            type: "weekly_days"
            interval_days: [1, 3, 5, 7]

        - area: "Innenstadt Nord"
          frequency:
            type: "weekly_days"
            interval_days: [2, 4, 6]

        - area: "Mettsud"
          frequency:
            type: "weekly_days"
            weekdays: [1]

        - area: "Mettnord"
          frequency:
            type: "weekly_days"
            weekdays: [2]

        - area: "Bözingen"
          frequency:
            type: "weekly_days"
            weekdays: [3]

        - area: "BözingenNord"
          frequency:
            type: "weekly_days"
            weekdays: [4]

        - area: "SportAnlagen"
          frequency:
            type: "weekly_days"
            weekdays: [1]

        - area: "Bözingenfeld"
          frequency:
            type: "weekly_days"
            weekdays: [5]

        - area: "Ipsach"
          frequency:
            type: "weekly_days"
            weekdays: [3]
          seasonal_overrides:
            - season: "summer"
              frequency:
                type: "weekly_days"
                interval_days: [2, 4, 6]