latent_filllevel:
  thresholds:
    empty_or_almost_empty_max_ratio: 0.25
    half_full_max_ratio: 0.75
    full_max_ratio: 1.00

  action_probabilities:
    empty_or_almost_empty:
      emptied: 0.00
    half_full:
      emptied: 0.5
    full:
      emptied: 1
    over_full:
      emptied: 1

  seasonal_factors:
    summer: 1.25

  weekday_factors:
    monday: 0.9
    tuesday: 0.95
    wednesday: 1.00
    thursday: 1.00
    friday: 1.10
    saturday: 1.25
    sunday: 1.25

  random_daily_multiplier:
    min: 0.85
    max: 1.15

  zone_base_fill_rate_ratio_per_day:
    robertwalser: 0.30
    innenstadt: 0.30
    innenstadtWest: 0.24
    innenstadtost: 0.24
    innenstadtNord: 0.22
    altstadt: 0.24
    seequartiere: 0.20
    moesli: 0.12
    madretsch: 0.14
    linde: 0.12
    muehlefeld: 0.10
    vingelz: 0.10
    beaumont: 0.12
    gurzelen: 0.12
    mettSud: 0.12
    mettNord: 0.10
    boezingen: 0.12
    boezingenNord: 0.10
    sportAnlagen: 0.16
    boezingenfeld: 0.10
    ipsach: 0.16
    default: 0.12

  zone_base_fill_rate_ratio_per_day_weekday_overrides:
    sportAnlagen:
      saturday: 0.30
      sunday: 0.30
    seequartiere:
      monday: 0.25
      tuesday: 0.25
      wednesday: 0.25
      thursday: 0.25
      friday: 0.25

  event_effects:
    enabled: true
    area_weight_default: 1.0
    random_multiplier_min: 0.9
    random_multiplier_max: 1.1
    per_day_event_increment_cap_ratio: 0.25
    multi_event_combination_cap_ratio: 0.35
    people_factor_buckets:
      - min_people: 0
        max_people: 999
        factor: 0.02
      - min_people: 1000
        max_people: 2999
        factor: 0.04
      - min_people: 3000
        max_people: 6999
        factor: 0.07
      - min_people: 7000
        max_people: 11999
        factor: 0.10
      - min_people: 12000
        max_people: 999999
        factor: 0.14

  weather_effects:
    enabled: true
    strong_weather_areas:
      - altstadt
      - sportAnlagen
      - seequartiere
    strong_area_intensity: 0.3
    default_area_intensity: 0.1
    min_multiplier: 0.7
    max_multiplier: 1.3
    weights:
      temp_mean: 0.45
      temp_max: 0.15
      sunshine: 0.30
      precipitation: 0.40
    normalization:
      temp_mean_baseline: 12.0
      temp_mean_scale: 10.0
      temp_max_baseline: 17.0
      temp_max_scale: 10.0
      sunshine_baseline: 300.0
      sunshine_scale: 240.0
      precipitation_baseline: 2.0
      precipitation_scale: 6.0
